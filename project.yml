name: SitTracker
options:
  bundleIdPrefix: com.fatbyrd
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only

schemes:
  SitTracker:
    build:
      targets:
        SitTracker: all
        SitTrackerTests: [test]
    test:
      targets:
        - SitTrackerTests
      commandLineArguments: {}
    run:
      config: Debug
    archive:
      config: Release

targets:
  SitTracker:
    type: application
    platform: iOS
    sources:
      - path: SitTracker
    info:
      path: SitTracker/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fatbyrd.sittracker
        INFOPLIST_FILE: SitTracker/Info.plist
        DEVELOPMENT_TEAM: ""

  SitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SitTrackerTests
    dependencies:
      - target: SitTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fatbyrd.sittracker.tests
        GENERATE_INFOPLIST_FILE: YES
